<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My 404 Page</title>
</head>
<body>
    <h3>Sorry, the page does not exist!</h3>
    <p>The page you are looking for cannot be found.</p>
    <h1 id="id01"></h1>
    <h1 id="id02"></h1>
    <script>
        const date = new Date();
        const date1 = date.toLocaleString("en-uk", { 
            hour12: true, 
            weekday: "short", 
            hour: "2-digit", 
            minute: "2-digit", 
            second: "2-digit",
            month: "2-digit", 
            year: "numeric", 
            day: "2-digit" 
        });
        document.getElementById("id01").innerHTML = date1;
        document.getElementById("id02").innerHTML = Date.now();
    </script>
</body>
</html>
